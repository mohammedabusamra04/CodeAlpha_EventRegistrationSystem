<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | EventPulse</title>

    <meta name="description" content="Sign in to your EventPulse account to manage registrations, view tickets, and access your organizer dashboard.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0e1a">

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo" aria-label="EventPulse Home">
            <span class="logo-icon" aria-hidden="true">⚡</span>
            <span class="logo-text">EventPulse</span>
        </a>
        <nav aria-label="Main navigation">
            <a href="/">Home</a>
            <a href="/events">Events</a>
            <div id="nav-auth-links" class="nav-buttons">
                <a href="/login" class="btn btn-secondary btn-sm">Sign In</a>
                <a href="/register" class="btn btn-primary btn-sm">Create Account</a>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section class="form-container">
            <h1 class="form-title">Welcome Back</h1>
            <p class="form-subtitle">Sign in to register for events and manage your tickets</p>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Sign In</button>
            </form>

            <p class="form-footer-text">
                Don't have an account? <a href="/register">Create one now</a>
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 EventPulse. Demo data for presentation purposes. All rights reserved.</p>
    </footer>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
