<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Panel | EventPulse</title>

    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0e1a">

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo" aria-label="EventPulse Home">
            <span class="logo-icon" aria-hidden="true">⚡</span>
            <span class="logo-text">EventPulse</span>
        </a>
        <nav aria-label="Main navigation">
            <a href="/">Home</a>
            <a href="/events">Events</a>
            <div id="nav-auth-links" class="nav-buttons"></div>
        </nav>
    </header>

    <main id="main-content">
        <div class="admin-header">
            <div>
                <h1>Manage Your Events</h1>
                <p style="color: var(--text-secondary);">Organizer control panel</p>
            </div>
            <button class="btn btn-primary" onclick="openCreateModal()">Add New Event</button>
        </div>

        <section class="admin-table-container" aria-label="Managed events">
            <table>
                <thead>
                    <tr>
                        <th scope="col">Event Title</th>
                        <th scope="col">Date</th>
                        <th scope="col">Location</th>
                        <th scope="col">Capacity</th>
                        <th scope="col">Available</th>
                        <th scope="col">Price</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-events-list">
                    <tr>
                        <td colspan="7" class="loading-state" role="status">Loading your events...</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <div id="event-modal" class="form-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="form-modal-content">
                <button class="close-modal" onclick="closeEventModal()" aria-label="Close dialog">&times;</button>
                <h2 id="modal-title" style="margin-bottom: 1.5rem;">Add New Event</h2>

                <form id="event-form" novalidate>
                    <input type="hidden" id="event-id">

                    <div class="form-group">
                        <label for="title" class="form-label">Event Title</label>
                        <input type="text" id="title" class="form-input" required maxlength="200">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="categoryId" class="form-label">Category</label>
                            <select id="categoryId" class="form-input form-select" required>
                                <option value="">Select a category...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="price" class="form-label">Ticket Price (0 for free)</label>
                            <input type="number" id="price" class="form-input" min="0" step="1" value="0" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description" class="form-label">Event Description</label>
                        <textarea id="description" class="form-input" rows="4" required maxlength="5000"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="thumbnail" class="form-label">Cover Image URL</label>
                        <input type="url" id="thumbnail" class="form-input" placeholder="https://example.com/image.jpg" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="location" class="form-label">City / Region</label>
                            <input type="text" id="location" class="form-input" placeholder="e.g. Downtown, Westside" required maxlength="150">
                        </div>
                        <div class="form-group">
                            <label for="address" class="form-label">Full Address</label>
                            <input type="text" id="address" class="form-input" placeholder="123 Main Street, Suite 100" required maxlength="300">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="startDate" class="form-label">Start Date & Time</label>
                            <input type="datetime-local" id="startDate" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="endDate" class="form-label">End Date & Time</label>
                            <input type="datetime-local" id="endDate" class="form-input" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="capacity" class="form-label">Maximum Capacity</label>
                        <input type="number" id="capacity" class="form-input" min="1" required>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                        <button type="button" class="btn btn-secondary" onclick="closeEventModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="submit-btn">Save Event</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 EventPulse. Demo data for presentation purposes. All rights reserved.</p>
    </footer>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="/js/main.js"></script>
    <script>
        const user = getAuthUser();
        if (!user || !['organizer', 'admin'].includes(user.role)) {
            showToast('You are not authorized to access this page.', 'error');
            setTimeout(() => window.location.href = '/login', 1500);
        }
    </script>
    <script src="/js/events.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
